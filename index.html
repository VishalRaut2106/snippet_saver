<!DOCTYPE html>
<html>
<head>
  <title>Snippet Saver</title>
  <link rel="stylesheet" href="style.css">
    <!-- Prism CSS -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />

    <!-- Prism JS -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>

    <!-- Language support -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
</head>
<body>

<header>
  <h1>💻 Snippet Saver</h1>
</header>

<div class="container">

    
  <!-- LEFT PANEL -->
  <div class="left">
    <h2>Add Snippet</h2>
    <input id="title" placeholder="Title">

    <textarea id="code" placeholder="Paste code here..."></textarea>

    <select id="language">
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
    </select>

    <button onclick="addSnippet()">Save</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="search-box">
      <input id="search" placeholder="Search..." onkeyup="searchSnippet()">
      <button onclick="clearSearch()" id="clear-btn" title="Clear Search">✖</button>
    </div>
    <div id="snippets"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast">Copied!</div>

<script src="script.js"></script>
</body>
</html>
